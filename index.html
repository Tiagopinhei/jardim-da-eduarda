<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nosso tempo | 🌻</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper: #fdfaf7; /* Fundo creme papel antigo */
            --ink: #2c2c2c;
            --gold: #d4af37; /* Dourado poético */
            --accent: #e0ac00;
        }

        body, html { margin: 0; padding: 0; background: var(--paper); color: var(--ink); font-family: 'Inter', sans-serif; overflow-x: hidden; text-align: center; scroll-behavior: smooth; }
        .bruno { font-family: 'Playfair Display', serif; font-style: italic; text-transform: lowercase; letter-spacing: -0.5px; }

        /* O CONTAINER DO CORAÇÃO MÁGICO */
        header {
            height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 20px;
        }

        h1 { font-size: 2.5rem; margin: 0; font-weight: 400; animation: fadeIn 2s ease-out; }
        .subtitle { color: #888; font-size: 1rem; opacity: 0; animation: fadeIn 2s 1s forwards; }

        /* O CONTAINER ONDE AS MEMÓRIAS NASCERÃO */
        #memory-heart {
            position: relative;
            width: 300px; /* Tamanho do coração */
            height: 300px;
            margin: 50px auto;
            perspective: 1000px; /* Profundidade 3D */
            pointer-events: auto; /* Garante que é clicável */
        }

        /* UMA FOTO INDIVIDUAL NO MOSAICO */
        .photo-card {
            position: absolute;
            width: 60px; /* Tamanho de cada foto/flor */
            height: 60px;
            border-radius: 50%; /* Faz a foto ser redonda */
            background-size: cover;
            background-position: center;
            border: 2px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.3s ease-out, box-shadow 0.3s ease-out, opacity 0.3s ease-out;
            opacity: 0;
            transform-origin: center center;
            will-change: transform;
        }

        /* Efeito de Bloom (Interatividade) */
        .photo-card:hover {
            transform: scale(1.3) rotate(-5deg) !important;
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.4);
            z-index: 100 !important;
        }

        /* TEXTO E CONTADOR MÍNIMO (ESTILO BRUNO FONTES) */
        .section {
            padding: 100px 20px;
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }

        .poem-line {
            font-size: 1.4rem;
            font-style: italic;
            margin-bottom: 40px;
            color: #bbb;
        }

        .highlight {
            color: var(--accent);
            font-weight: 600;
        }

        .timer-box {
            border: 1px solid var(--accent);
            padding: 40px;
            border-radius: 15px;
            margin: 50px auto;
            max-width: 500px;
            background: rgba(212, 175, 55, 0.03);
            font-variant-numeric: tabular-nums; /* Mantém os números fixos */
        }

        #timer { font-size: 1.1rem; letter-spacing: 1.5px; font-weight: bold; color: var(--gold); }

        /* RODAPÉ MÍNIMO */
        footer { padding: 80px; text-align: center; font-size: 0.8rem; opacity: 0.4; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header>
        <div data-aos="fade-up">
            <h1 class="bruno">o sol que a gente divide.</h1>
            <p class="subtitle">para eduarda, com todo o meu girassol.</p>
        </div>
        
        <div id="memory-heart"></div>
    </header>

    <div class="section">
      <div class="poem-line bruno" style="margin-top: 0;">
            de todos os janeiros que eu já vivi,<br>
            não foi sorte.<br>
            agosto me provou que a gente era destino.
        </div>
    </div>

    <div class="section">
        <div class="timer-box" style="margin-top: 0;">
            <p style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; color: #888;">Nós dois</p>
            <div id="timer">Calculando nossa história...</div>
            <p class="bruno" style="color: var(--accent); margin-top: 10px;">dias e noites virando pro sol.</p>
        </div>
    </div>

    <footer class="bruno">tiago & eduarda — 2026</footer>

    <script>
        // --- 1. CONFIGURAÇÃO DE DATAS ---
        const start = new Date(2025, 7, 28); // 28 de Agosto (mês 7)

        // --- 2. GERAÇÃO DO CORAÇÃO MÁGICO ---
        function createHeart() {
            const container = document.getElementById('memory-heart');
            
            // --- INSIRA OS LINKS DAS SUAS 10 FOTOS AQUI ---
            const photos = [
                'foto1.jpg',
                'foto2.jpg',
                'foto3.jpg',
                'foto4.jpg',
                'foto5.jpg',
                'foto6.jpg',
                'foto7.jpg',
                'foto8.jpg',
                'foto9.jpg',
                'foto10.jpg'
            ];

            const totalPhotos = photos.length;

            for (let i = 0; i < totalPhotos; i++) {
                const card = document.createElement('div');
                card.className = 'photo-card';
                card.style.backgroundImage = `url('${photos[i]}')`;

                // --- MATEMÁTICA DO CORAÇÃO (FÓRMULA PROCEDURAL) ---
                // Isso espalha as fotos em um formato de coração orgânico
                const t = Math.random() * 2 * Math.PI;
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
                
                // Posicionamento no container
                // 150 é o centro, x * 6 é o raio
                const left = (150 + x * 6) + 'px';
                const top = (130 + y * 6) + 'px';

                // Aplica posição e delay aleatório para o bloom
                card.style.left = left;
                card.style.top = top;
                card.style.zIndex = Math.floor(y + 100); // Fotos de baixo ficam na frente
                card.style.animation = `bloom 1s ease-out ${Math.random() * 1.5}s forwards`;
                
                // Rotaciona a foto aleatoriamente para parecer "espalhada"
                const rotation = -15 + Math.random() * 30;
                card.style.transform = `rotate(${rotation}deg) scale(0)`;

                container.appendChild(card);
            }
        }

        // Animação de aparecimento das fotos
        const bloomAnimation = document.createElement('style');
        bloomAnimation.innerHTML = `
            @keyframes bloom {
                0% { opacity: 0; transform: scale(0) rotate(0deg); }
                100% { opacity: 1; transform: scale(1) rotate(0deg); }
            }
        `;
        document.head.appendChild(bloomAnimation);

        // --- 3. CONTADOR ---
        function update() {
            const now = new Date();
            const diff = now - start;
            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff / 3600000) % 24);
            const m = Math.floor((diff / 60000) % 60);
            const s = Math.floor((diff / 1000) % 60);
            document.getElementById('timer').innerText = `${d} dias • ${h}H • ${m}M • ${s}S`;
        }
        setInterval(update, 1000);
        update();

        // Inicializa o Coração
        createHeart();
    </script>
</body>
</html>
